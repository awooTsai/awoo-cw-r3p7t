<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>會議摘要 — awoo x 天下雜誌 | 2026-03-24</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --pop-red: #E3242B;
  --pop-yellow: #FFD700;
  --pop-blue: #1E90FF;
  --pop-black: #1a1a1a;
  --pop-white: #FFFFF0;
  --pop-pink: #FF69B4;
  --pop-orange: #FF6347;
  --pop-green: #32CD32;
  --accent: #e85d26;
  --accent-light: #fff3ee;
  --border: 3px solid var(--pop-black);
  --dot-size: 2px;
  --dot-gap: 8px;
  --radius: 6px;
  --radius-lg: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', 'Comic Neue', sans-serif;
  background-color: var(--pop-white);
  background-image: radial-gradient(circle, rgba(0,0,0,0.04) var(--dot-size), transparent var(--dot-size));
  background-size: var(--dot-gap) var(--dot-gap);
  color: var(--pop-black);
  line-height: 1.7;
}

.container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

/* ===== HEADER ===== */
.report-header {
  background: var(--pop-yellow);
  border-bottom: var(--border);
  padding: 36px 0 28px;
  position: relative;
}
.report-header::after {
  content: '';
  position: absolute;
  bottom: -7px; left: 0; right: 0;
  height: 4px;
  background: var(--pop-red);
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  font-family: 'Bangers', 'Noto Sans TC', cursive;
  font-size: 0.95rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--pop-black);
}
.header-brand .dot { width: 10px; height: 10px; background: var(--pop-red); border-radius: 50%; border: 2px solid var(--pop-black); }
.report-header h1 {
  font-family: 'Bangers', 'Noto Sans TC', cursive;
  font-size: 2.2rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 18px;
  color: var(--pop-black);
  text-shadow: 2px 2px 0 var(--pop-red), -1px -1px 0 transparent;
  letter-spacing: 1px;
  text-transform: none;
}
.header-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  font-size: 0.88rem;
  color: var(--pop-black);
  font-weight: 500;
}
.header-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--pop-white);
  border: 2px solid var(--pop-black);
  padding: 4px 12px;
  border-radius: 4px;
}
.header-meta-item svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ===== TOOLBAR ===== */
.toolbar {
  background: var(--pop-white);
  border-bottom: var(--border);
  padding: 10px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.toolbar-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.toolbar-inner::-webkit-scrollbar { display: none; }
.toolbar-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border: 2px solid var(--pop-black);
  border-radius: 4px;
  background: var(--pop-white);
  color: var(--pop-black);
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
  font-family: inherit;
  box-shadow: 2px 2px 0 var(--pop-black);
}
.toolbar-btn:hover { background: var(--pop-yellow); transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--pop-black); }
.toolbar-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--pop-black); }
.toolbar-btn.active { background: var(--pop-red); color: white; }
.toolbar-btn svg { width: 14px; height: 14px; }
.toolbar-spacer { flex: 1; }

/* ===== PARTICIPANTS ===== */
.participants {
  background: var(--pop-white);
  border: var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin: 24px 0;
  box-shadow: 4px 4px 0 var(--pop-black);
}
.participants h3 { font-family: 'Bangers', cursive; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; color: var(--pop-black); margin-bottom: 16px; }
.participant-groups { display: flex; gap: 24px; flex-wrap: wrap; }
.participant-group { flex: 1; min-width: 200px; }
.participant-group-label {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--pop-white);
  background: var(--pop-red);
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  padding: 4px 12px;
  display: inline-block;
  border: 2px solid var(--pop-black);
}
.participant-group-label:nth-child(1) { background: var(--pop-red); }
.participant-item { padding: 6px 0; }
.participant-name { font-weight: 700; font-size: 0.95rem; }
.participant-role { color: #555; font-size: 0.8rem; }

/* ===== SECTIONS ===== */
.section { margin: 28px 0; }
.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--pop-black);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 3px solid var(--pop-yellow);
}
.section-title .section-icon { font-size: 1.3rem; }
.section-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  background: var(--pop-red);
  color: white;
  border: 2px solid var(--pop-black);
  border-radius: 50%;
  font-family: 'Bangers', cursive;
  font-size: 1rem;
  font-weight: 700;
}

/* ===== SUMMARY CARD ===== */
.summary-card {
  background: var(--pop-yellow);
  border: var(--border);
  border-radius: var(--radius);
  padding: 24px;
  font-size: 0.95rem;
  line-height: 1.8;
  box-shadow: 4px 4px 0 var(--pop-black);
  position: relative;
}

/* ===== DISCUSSION CARDS ===== */
.discussion-card {
  background: var(--pop-white);
  border: var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 3px 3px 0 var(--pop-black);
  transition: transform 0.12s, box-shadow 0.12s;
}
.discussion-card:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--pop-black); }
.discussion-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.discussion-header:hover { background: #fffde6; }
.discussion-icon { font-size: 1.4rem; flex-shrink: 0; }
.discussion-title { flex: 1; font-weight: 700; font-size: 0.95rem; }
.discussion-chevron {
  width: 20px; height: 20px;
  color: var(--pop-black);
  transition: transform 0.25s ease;
  flex-shrink: 0;
}
.discussion-card.open .discussion-chevron { transform: rotate(180deg); }
.discussion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.discussion-body-inner {
  padding: 0 18px 18px;
  border-top: 2px dashed #ccc;
}
.discussion-body-inner p {
  color: #333;
  font-size: 0.9rem;
  line-height: 1.8;
  margin-top: 14px;
}
.discussion-insight {
  background: #e6f2ff;
  border: 2px solid var(--pop-blue);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-top: 14px;
  font-size: 0.85rem;
  color: #1a56a0;
  font-weight: 500;
}
.discussion-insight::before { content: '💡 '; }

/* ===== DECISIONS ===== */
.decision-list { list-style: none; }
.decision-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  background: var(--pop-white);
  border: var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  box-shadow: 3px 3px 0 var(--pop-black);
}
.decision-check {
  width: 24px; height: 24px;
  background: #e6ffe6;
  border: 2px solid var(--pop-green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.decision-check svg { width: 12px; height: 12px; color: var(--pop-green); }
.decision-text { font-size: 0.9rem; line-height: 1.6; }
.priority-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 3px;
  font-size: 0.7rem;
  font-weight: 700;
  margin-left: 6px;
  vertical-align: middle;
  border: 2px solid var(--pop-black);
  text-transform: uppercase;
}
.priority-high { background: var(--pop-red); color: white; }
.priority-medium { background: var(--pop-yellow); color: var(--pop-black); }
.priority-low { background: #eee; color: #666; }

/* ===== ACTION TABLE ===== */
.action-table-wrapper {
  overflow-x: auto;
  border: var(--border);
  border-radius: var(--radius);
  box-shadow: 4px 4px 0 var(--pop-black);
}
.action-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--pop-white);
  font-size: 0.88rem;
}
.action-table th {
  background: var(--pop-blue);
  color: white;
  padding: 12px 16px;
  text-align: left;
  font-weight: 700;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: var(--border);
  white-space: nowrap;
}
.action-table td {
  padding: 14px 16px;
  border-bottom: 2px solid #eee;
  vertical-align: top;
}
.action-table tr:last-child td { border-bottom: none; }
.action-table tr:hover td { background: #fffde6; }
.owner-tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 3px;
  font-size: 0.78rem;
  font-weight: 700;
  white-space: nowrap;
  border: 2px solid var(--pop-black);
}
.owner-awoo { background: var(--pop-yellow); color: var(--pop-black); }
.owner-client { background: #b3e0ff; color: #0a3d6b; }
.owner-both { background: #e8d5f5; color: #5b21b6; }
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 3px;
  font-size: 0.78rem;
  font-weight: 700;
  background: var(--pop-yellow);
  color: var(--pop-black);
  border: 2px solid var(--pop-black);
}
.status-badge::before { content: '⏳'; font-size: 0.7rem; }

/* ===== VALUE HIGHLIGHTS ===== */
.value-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.value-card {
  background: var(--pop-white);
  border: var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: 3px 3px 0 var(--pop-black);
  transition: transform 0.12s, box-shadow 0.12s;
}
.value-card:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--pop-black); }
.value-card:nth-child(1) { border-left: 6px solid var(--pop-red); }
.value-card:nth-child(2) { border-left: 6px solid var(--pop-blue); }
.value-card:nth-child(3) { border-left: 6px solid var(--pop-yellow); }
.value-card:nth-child(4) { border-left: 6px solid var(--pop-green); }
.value-card h4 {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--pop-black);
  margin-bottom: 8px;
}
.value-card p { font-size: 0.85rem; color: #444; line-height: 1.7; }

/* ===== FOOTER ===== */
.report-footer {
  margin-top: 40px;
  padding: 28px 0;
  border-top: var(--border);
  text-align: center;
  background: var(--pop-yellow);
}
.footer-brand {
  font-family: 'Bangers', cursive;
  font-size: 1rem;
  color: var(--pop-black);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.footer-contact { font-size: 0.85rem; color: var(--pop-black); }
.footer-contact a { color: var(--pop-red); text-decoration: none; font-weight: 700; }
.footer-contact a:hover { text-decoration: underline; }
.footer-note {
  margin-top: 14px;
  font-size: 0.75rem;
  color: #666;
}
.footer-signature {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 14px 20px;
  background: var(--pop-white);
  border: 2px solid var(--pop-black);
  border-radius: var(--radius);
  display: inline-flex;
  box-shadow: 2px 2px 0 var(--pop-black);
}

/* ===== COPY TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--pop-black);
  color: var(--pop-yellow);
  padding: 10px 24px;
  border: 2px solid var(--pop-yellow);
  border-radius: 4px;
  font-size: 0.85rem;
  font-weight: 700;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .report-header h1 { font-size: 1.6rem; }
  .header-meta { gap: 10px; }
  .participant-groups { flex-direction: column; gap: 16px; }
  .value-grid { grid-template-columns: 1fr; }
  .action-table { font-size: 0.82rem; }
  .action-table th, .action-table td { padding: 10px 12px; }
}

/* ===== PRINT ===== */
@media print {
  body { background: white; background-image: none; }
  .toolbar { display: none; }
  .toast { display: none; }
  .discussion-body { max-height: none !important; }
  .discussion-chevron { display: none; }
  .report-header, .report-footer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .report-header::after { display: none; }
  .value-card:hover, .discussion-card:hover { transform: none; }
  .section { break-inside: avoid; }
  * { box-shadow: none !important; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="report-header">
  <div class="container">
    <div class="header-brand">
      <span class="dot"></span>
      <span>Meeting Summary Report</span>
    </div>
    <h1 id="report-title"></h1>
    <div class="header-meta" id="header-meta"></div>
  </div>
</header>

<!-- TOOLBAR -->
<nav class="toolbar">
  <div class="container">
    <div class="toolbar-inner">
      <button class="toolbar-btn" onclick="scrollToSection('summary')">📌 摘要</button>
      <button class="toolbar-btn" onclick="scrollToSection('discussions')">💬 討論</button>
      <button class="toolbar-btn" onclick="scrollToSection('decisions')">✅ 決策</button>
      <button class="toolbar-btn" onclick="scrollToSection('actions')">📋 待辦</button>
      <button class="toolbar-btn" onclick="scrollToSection('value')">💎 價值</button>
      <span class="toolbar-spacer"></span>
      <button class="toolbar-btn" onclick="toggleAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        全展開
      </button>
      <button class="toolbar-btn" onclick="copyLink()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        複製連結
      </button>
      <button class="toolbar-btn" onclick="window.print()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        列印
      </button>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main class="container">

  <!-- PARTICIPANTS -->
  <div class="participants">
    <h3>與會人員</h3>
    <div class="participant-groups" id="participants"></div>
  </div>

  <!-- SUMMARY -->
  <section class="section" id="summary">
    <div class="section-title">
      <span class="section-number">1</span>
      會議重點摘要
    </div>
    <div class="summary-card" id="summary-text"></div>
  </section>

  <!-- DISCUSSION POINTS -->
  <section class="section" id="discussions">
    <div class="section-title">
      <span class="section-number">2</span>
      討論要點
    </div>
    <div id="discussion-list"></div>
  </section>

  <!-- DECISIONS -->
  <section class="section" id="decisions">
    <div class="section-title">
      <span class="section-number">3</span>
      達成共識
    </div>
    <ul class="decision-list" id="decision-list"></ul>
  </section>

  <!-- ACTION ITEMS -->
  <section class="section" id="actions">
    <div class="section-title">
      <span class="section-number">4</span>
      行動項目
    </div>
    <div class="action-table-wrapper">
      <table class="action-table">
        <thead>
          <tr>
            <th>任務</th>
            <th>負責人</th>
            <th>時程</th>
            <th>狀態</th>
          </tr>
        </thead>
        <tbody id="action-tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- VALUE HIGHLIGHTS -->
  <section class="section" id="value">
    <div class="section-title">
      <span class="section-number">5</span>
      合作價值亮點
    </div>
    <div class="value-grid" id="value-grid"></div>
  </section>

</main>

<!-- FOOTER -->
<footer class="report-footer">
  <div class="container">
    <div class="footer-note" style="margin-top:0; margin-bottom:18px;">本報告僅供雙方內部參考使用</div>
    <div class="footer-signature">

// Footer is now static HTML with signature block

// === Interactivity ===

function toggleCard(header) {
  const card = header.parentElement;
  const body = card.querySelector('.discussion-body');
  const inner = card.querySelector('.discussion-body-inner');
  if (card.classList.contains('open')) {
    body.style.maxHeight = '0';
    card.classList.remove('open');
  } else {
    body.style.maxHeight = inner.scrollHeight + 'px';
    card.classList.add('open');
  }
}

let allOpen = false;
function toggleAll() {
  allOpen = !allOpen;
  document.querySelectorAll('.discussion-card').forEach(card => {
    const body = card.querySelector('.discussion-body');
    const inner = card.querySelector('.discussion-body-inner');
    if (allOpen) {
      body.style.maxHeight = inner.scrollHeight + 'px';
      card.classList.add('open');
    } else {
      body.style.maxHeight = '0';
      card.classList.remove('open');
    }
  });
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) {
    const offset = 60;
    const y = el.getBoundingClientRect().top + window.pageYOffset - offset;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    showToast('連結已複製到剪貼簿 ✓');
  }).catch(() => {
    showToast('請手動複製網址列的連結');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Active nav highlight
const sections = ['summary', 'discussions', 'decisions', 'actions', 'value'];
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      document.querySelectorAll('.toolbar-btn').forEach(btn => btn.classList.remove('active'));
      const idx = sections.indexOf(entry.target.id);
      if (idx >= 0) {
        document.querySelectorAll('.toolbar-btn')[idx].classList.add('active');
      }
    }
  });
}, { rootMargin: '-80px 0px -60% 0px' });
sections.forEach(id => { const el = document.getElementById(id); if (el) observer.observe(el); });
</script>
